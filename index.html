<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>阿美族色彩密碼互動遊戲</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --paper: #fff8ec;
      --surface: #ffffff;
      --ink: #25211d;
      --muted: #6c6259;
      --line: rgba(37, 33, 29, 0.16);
      --red: #d94638;
      --yellow: #f1c84b;
      --green: #3c936b;
      --teal: #146c75;
      --blue: #2f68b8;
      --shadow: 0 18px 42px rgba(37, 33, 29, 0.12);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(20, 108, 117, 0.08) 0 1px, transparent 1px 32px),
        linear-gradient(180deg, #fff8ec 0%, #f5f1e5 100%);
      font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px clamp(16px, 4vw, 44px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 248, 236, 0.9);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      background: conic-gradient(from 45deg, var(--red), var(--yellow), var(--green), var(--teal), var(--red));
      box-shadow: inset 0 0 0 9px #fff8ec;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.08;
      font-weight: 950;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .pill {
      min-width: 84px;
      padding: 9px 12px;
      border: 2px solid var(--ink);
      background: var(--surface);
      box-shadow: 4px 4px 0 var(--ink);
      text-align: center;
      font-weight: 900;
    }

    .mode {
      display: inline-grid;
      grid-template-columns: repeat(3, 1fr);
      border: 2px solid var(--ink);
      background: var(--surface);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .mode button {
      border: 0;
      min-width: 72px;
      padding: 10px 12px;
      background: transparent;
      color: var(--ink);
      font-weight: 900;
    }

    .mode button[aria-pressed="true"] {
      background: var(--yellow);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: clamp(18px, 3vw, 34px);
      padding: clamp(16px, 4vw, 44px);
      max-width: 1360px;
      width: 100%;
      margin: 0 auto;
      align-items: start;
    }

    .stage,
    .vocab {
      background: rgba(255, 255, 255, 0.78);
      border: 2px solid var(--ink);
      box-shadow: var(--shadow);
    }

    .stage {
      min-height: min(680px, calc(100vh - 150px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .progress-wrap {
      height: 14px;
      background: #ece1cf;
      border-bottom: 2px solid var(--ink);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
      transition: width 260ms ease;
    }

    .question {
      padding: clamp(18px, 4vw, 38px);
      display: grid;
      gap: clamp(18px, 3vw, 28px);
      align-content: start;
    }

    .roundline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-weight: 900;
    }

    .roundline span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: #fff8ec;
    }

    .prompt {
      margin: 0;
      font-size: clamp(30px, 5vw, 62px);
      line-height: 1.05;
      font-weight: 950;
      max-width: 900px;
    }

    .prompt small {
      display: block;
      margin-top: 12px;
      font-size: clamp(18px, 2.3vw, 28px);
      color: var(--muted);
      line-height: 1.35;
      font-weight: 800;
    }

    .visual-zone {
      min-height: 168px;
      display: grid;
      grid-template-columns: minmax(180px, 320px) 1fr;
      gap: clamp(16px, 3vw, 30px);
      align-items: center;
    }

    .flower {
      width: min(100%, 280px);
      aspect-ratio: 1;
      margin-inline: auto;
      position: relative;
      filter: drop-shadow(0 16px 16px rgba(37, 33, 29, 0.15));
    }

    .petal,
    .center,
    .stem,
    .leaf {
      position: absolute;
    }

    .petal {
      width: 38%;
      height: 38%;
      left: 31%;
      top: 8%;
      background: var(--flower, #d94638);
      border: 3px solid var(--ink);
      border-radius: 60% 60% 52% 52%;
      transform-origin: 50% 110%;
    }

    .petal:nth-child(2) { transform: rotate(72deg); }
    .petal:nth-child(3) { transform: rotate(144deg); }
    .petal:nth-child(4) { transform: rotate(216deg); }
    .petal:nth-child(5) { transform: rotate(288deg); }

    .center {
      width: 24%;
      height: 24%;
      left: 38%;
      top: 38%;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: #f8d66d;
      z-index: 2;
    }

    .stem {
      width: 8%;
      height: 38%;
      left: 46%;
      bottom: 0;
      border: 3px solid var(--ink);
      border-top: 0;
      background: #3c936b;
    }

    .leaf {
      width: 24%;
      height: 16%;
      left: 54%;
      bottom: 18%;
      background: #4cab75;
      border: 3px solid var(--ink);
      border-radius: 70% 10% 70% 10%;
      transform: rotate(-18deg);
    }

    .word-preview {
      min-height: 128px;
      display: grid;
      align-content: center;
      gap: 10px;
      padding: 22px;
      border: 2px dashed rgba(37, 33, 29, 0.32);
      background: #fff8ec;
    }

    .word-preview .amis {
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1;
      font-weight: 950;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .word-preview .zh {
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .mystery-token {
      min-height: 220px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 14px;
      padding: 22px;
      border: 3px solid var(--ink);
      background:
        linear-gradient(135deg, rgba(217, 70, 56, 0.14) 0 18%, transparent 18% 34%, rgba(241, 200, 75, 0.24) 34% 52%, transparent 52% 70%, rgba(60, 147, 107, 0.16) 70% 100%),
        #fff8ec;
      box-shadow: 8px 8px 0 var(--ink);
      text-align: center;
    }

    .mystery-token b {
      font-size: clamp(34px, 4.2vw, 54px);
      line-height: 1;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .mystery-token span {
      display: inline-block;
      padding: 7px 12px;
      background: var(--ink);
      color: #fff8ec;
      font-weight: 950;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .listen-area {
      display: grid;
      gap: 18px;
    }

    .listen-button {
      min-height: 92px;
      padding: 16px;
      border: 2px solid var(--ink);
      background: #fff1c2;
      color: var(--ink);
      box-shadow: 5px 5px 0 rgba(37, 33, 29, 0.95);
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 14px;
      align-items: center;
      text-align: left;
      transition: transform 130ms ease, box-shadow 130ms ease, background 130ms ease;
    }

    .listen-button:hover,
    .listen-button:focus-visible {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 rgba(37, 33, 29, 0.95);
      outline: 3px solid rgba(47, 104, 184, 0.28);
      outline-offset: 2px;
    }

    .play-mark {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      background: var(--red);
      color: #fff8ec;
      font-size: 28px;
      font-weight: 950;
      line-height: 1;
      box-shadow: inset 0 0 0 6px rgba(255, 255, 255, 0.22);
    }

    .listen-button strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      font-weight: 950;
      white-space: nowrap;
    }

    .listen-button span span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 850;
    }

    .picture-choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(130px, 1fr));
      gap: 14px;
    }

    .picture-card {
      min-height: 214px;
      padding: 14px;
      border: 2px solid var(--ink);
      background: #fff8ec;
      color: var(--ink);
      box-shadow: 5px 5px 0 rgba(37, 33, 29, 0.95);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 10px;
      text-align: center;
      transition: transform 130ms ease, box-shadow 130ms ease, background 130ms ease;
    }

    .picture-card:hover,
    .picture-card:focus-visible {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 rgba(37, 33, 29, 0.95);
      outline: 3px solid rgba(47, 104, 184, 0.28);
      outline-offset: 2px;
    }

    .picture-card.is-correct {
      background: #e4f5dd;
    }

    .picture-card.is-wrong {
      background: #ffe0da;
    }

    .picture-card .flower {
      width: min(82%, 142px);
    }

    .picture-caption strong {
      display: block;
      font-size: 22px;
      line-height: 1;
      font-weight: 950;
      white-space: nowrap;
    }

    .picture-caption span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .choice {
      min-height: 92px;
      padding: 14px;
      border: 2px solid var(--ink);
      background: var(--surface);
      color: var(--ink);
      box-shadow: 5px 5px 0 rgba(37, 33, 29, 0.95);
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      text-align: left;
      transition: transform 130ms ease, box-shadow 130ms ease, background 130ms ease;
    }

    .choice:hover,
    .choice:focus-visible {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 rgba(37, 33, 29, 0.95);
      outline: 3px solid rgba(47, 104, 184, 0.28);
      outline-offset: 2px;
    }

    .choice.is-correct {
      background: #e4f5dd;
    }

    .choice.is-wrong {
      background: #ffe0da;
    }

    .swatch {
      width: 42px;
      height: 42px;
      border: 2px solid var(--ink);
      background: var(--swatch);
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.32);
    }

    .choice strong {
      display: block;
      font-size: 20px;
      line-height: 1.05;
      font-weight: 950;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .choice span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.25;
      font-weight: 800;
    }

    .sound-button {
      min-width: 46px;
      min-height: 46px;
      border: 2px solid var(--ink);
      background: var(--yellow);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      display: grid;
      place-items: center;
      font-size: 21px;
      font-weight: 950;
      line-height: 1;
      transition: transform 130ms ease, box-shadow 130ms ease, opacity 130ms ease;
    }

    .sound-button::before {
      content: "♪";
    }

    .sound-button:hover,
    .sound-button:focus-visible {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 var(--ink);
      outline: 3px solid rgba(47, 104, 184, 0.28);
      outline-offset: 2px;
    }

    .sound-button[disabled] {
      cursor: not-allowed;
      opacity: 0.35;
      filter: grayscale(1);
      transform: none;
    }

    .spell-area {
      display: grid;
      gap: 18px;
    }

    .answer-tray,
    .chunk-tray {
      min-height: 76px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 13px;
      border: 2px solid var(--ink);
      background: #fff8ec;
    }

    .answer-tray {
      background: #fbf0d9;
    }

    .chunk {
      min-width: 68px;
      min-height: 48px;
      padding: 10px 14px;
      border: 2px solid var(--ink);
      background: var(--surface);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      font-size: 20px;
      font-weight: 950;
      transition: transform 130ms ease, opacity 130ms ease;
    }

    .chunk:hover,
    .chunk:focus-visible {
      transform: translateY(-2px);
      outline: 3px solid rgba(47, 104, 184, 0.28);
      outline-offset: 2px;
    }

    .chunk.used {
      opacity: 0.35;
      pointer-events: none;
      transform: none;
    }

    .stage-footer {
      min-height: 92px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px clamp(18px, 4vw, 38px);
      border-top: 2px solid var(--ink);
      background: var(--ink);
      color: #fff8ec;
    }

    .feedback {
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.25;
      font-weight: 950;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action {
      min-height: 46px;
      padding: 10px 16px;
      border: 2px solid #fff8ec;
      background: transparent;
      color: #fff8ec;
      font-weight: 950;
    }

    .action.primary {
      background: var(--yellow);
      color: var(--ink);
      border-color: var(--yellow);
    }

    .vocab {
      padding: 18px;
      display: grid;
      gap: 16px;
      position: sticky;
      top: 100px;
    }

    .vocab h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 950;
    }

    .vocab h2 small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .mini-card {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      background: #fff8ec;
    }

    .mini-card strong {
      display: block;
      line-height: 1.1;
      font-weight: 950;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .mini-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .lesson-image {
      border: 2px solid var(--ink);
      overflow: hidden;
      background: #e8fbff;
    }

    .lesson-image img {
      width: 100%;
      display: block;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      font-weight: 700;
    }

    .complete {
      min-height: 420px;
      display: grid;
      align-content: center;
      justify-items: start;
      gap: 18px;
    }

    .complete h2 {
      margin: 0;
      font-size: clamp(38px, 6vw, 72px);
      line-height: 1.02;
      font-weight: 950;
    }

    .complete p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(18px, 2.2vw, 25px);
      line-height: 1.45;
      font-weight: 800;
      max-width: 760px;
    }

    .complete .action {
      background: var(--red);
      border-color: var(--ink);
      color: #fff8ec;
      box-shadow: 5px 5px 0 var(--ink);
    }

    @media (max-width: 1040px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .vocab {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .vocab h2,
      .lesson-image,
      .note {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .status {
        justify-content: stretch;
      }

      .pill,
      .mode {
        flex: 1 1 auto;
      }

      .layout {
        padding: 12px;
      }

      .visual-zone {
        grid-template-columns: 1fr;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .listen-button {
        grid-template-columns: 52px 1fr;
      }

      .play-mark {
        width: 52px;
        height: 52px;
      }

      .stage-footer {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .action {
        flex: 1 1 auto;
      }

      .vocab {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>kahengangay · kaliyalaway</h1>
          <p>阿美族色彩密碼｜hana（花）</p>
        </div>
      </div>
      <div class="status" aria-label="遊戲狀態">
        <div class="mode" aria-label="模式">
          <button type="button" data-mode="listen" aria-pressed="true">hana 聽圖</button>
          <button type="button" data-mode="basic" aria-pressed="false">入門</button>
          <button type="button" data-mode="challenge" aria-pressed="false">挑戰</button>
        </div>
        <div class="pill" id="scoreBox">0 分</div>
        <div class="pill" id="roundBox">1 / 8</div>
      </div>
    </header>

    <main class="layout">
      <section class="stage" aria-live="polite">
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="question" id="gameStage"></div>
        <footer class="stage-footer">
          <div class="feedback" id="feedback">先聽族語，再找圖卡。</div>
          <div class="actions">
            <button class="action" type="button" id="resetBtn">重新開始</button>
            <button class="action primary" type="button" id="nextBtn">下一題</button>
          </div>
        </footer>
      </section>

      <aside class="vocab" aria-label="色彩詞彙表">
        <h2>kahengangay / kaliyalaway <small>課堂色彩詞</small></h2>
        <div id="vocabList"></div>
        <figure class="lesson-image">
          <img src="assets/color-practice.png" alt="附件課堂色卡">
        </figure>
        <p class="note">聲音來源：原住民族語E樂園（財團法人原住民族語言研究發展基金會）海岸阿美語學習詞表，依 CC BY-NC-SA 4.0 非商業教學使用；實際發音以授課教師與族語老師示範為準。</p>
      </aside>
    </main>
  </div>

  <script>
    const colors = [
      {
        key: "kahengangay",
        zh: "紅色",
        hex: "#d94638",
        meaning: "熱情、活力、生命力",
        audio: "assets/audio/kahengangay.wav",
        chunks: ["ka", "hen", "gan", "gay"]
      },
      {
        key: "kaliyalaway",
        zh: "黃色",
        hex: "#f1c84b",
        meaning: "陽光、豐收",
        audio: "assets/audio/kaliyalaway.wav",
        chunks: ["ka", "li", "ya", "la", "way"]
      },
      {
        key: "kohecalay",
        zh: "白色",
        hex: "#f7f3e9",
        meaning: "課堂色卡詞",
        audio: "assets/audio/kohecalay.wav",
        chunks: ["ko", "he", "ca", "lay"]
      },
      {
        key: "kohelaay",
        zh: "粉紅色",
        hex: "#ef88c4",
        meaning: "課堂色卡詞",
        chunks: ["ko", "he", "la", "ay"]
      },
      {
        key: "kandaway",
        zh: "綠色",
        hex: "#59bb67",
        meaning: "課堂色卡詞",
        audio: "assets/audio/kandaway.wav",
        chunks: ["kan", "da", "way"]
      },
      {
        key: "kohetingay",
        zh: "黑色",
        hex: "#33312d",
        meaning: "課堂色卡詞",
        audio: "assets/audio/kohetingay.wav",
        chunks: ["ko", "he", "tin", "gay"]
      }
    ];

    const listenKeys = ["kahengangay", "kaliyalaway", "kandaway"];
    const basicKeys = ["kahengangay", "kaliyalaway"];
    const flowerPhrases = [
      {
        phrase: "kahengangay a hana",
        zh: "紅色的花",
        color: "kahengangay",
        chunks: ["kahengangay", "a", "hana"]
      },
      {
        phrase: "kaliyalaway a hana",
        zh: "黃色的花",
        color: "kaliyalaway",
        chunks: ["kaliyalaway", "a", "hana"]
      }
    ];

    const state = {
      mode: "listen",
      questions: [],
      index: 0,
      score: 0,
      streak: 0,
      locked: false,
      spellPicked: []
    };

    const byKey = (key) => colors.find((item) => item.key === key);
    const stage = document.querySelector("#gameStage");
    const feedback = document.querySelector("#feedback");
    const scoreBox = document.querySelector("#scoreBox");
    const roundBox = document.querySelector("#roundBox");
    const progressBar = document.querySelector("#progressBar");
    const nextBtn = document.querySelector("#nextBtn");
    const resetBtn = document.querySelector("#resetBtn");
    const vocabList = document.querySelector("#vocabList");
    const audioPool = new Map();

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildListenChoices(answerKey) {
      const distractor = shuffle(listenKeys.filter((key) => key !== answerKey))[0];
      return shuffle([answerKey, distractor]);
    }

    function buildListenQuestions() {
      return shuffle([...listenKeys, ...listenKeys]).map((key) => ({
        type: "listenPicture",
        answer: key,
        title: "hana",
        sub: "聽族語，找顏色圖卡",
        choices: buildListenChoices(key)
      }));
    }

    function buildQuestions(mode) {
      if (mode === "listen") {
        return buildListenQuestions();
      }

      const activeKeys = mode === "basic" ? basicKeys : colors.map((item) => item.key);
      const activeColors = activeKeys.map(byKey);
      const colorPick = activeColors.map((item) => ({
        type: "pickColor",
        answer: item.key,
        title: item.key,
        sub: `${item.zh}｜選出對應色塊`,
        previewPrimary: item.key,
        previewSecondary: item.zh,
        choices: shuffle(activeColors).map((choice) => choice.key)
      }));
      const wordPick = activeColors.slice(0, mode === "basic" ? 2 : 4).map((item) => ({
        type: "pickWord",
        answer: item.key,
        title: "hana",
        sub: `${item.zh}｜看花的顏色，選出族語詞`,
        previewPrimary: "hana",
        previewSecondary: `${item.zh} 的花｜${item.meaning}`,
        choices: shuffle(activeColors).map((choice) => choice.key)
      }));
      const phrasePick = flowerPhrases.map((item) => ({
        type: "pickFlower",
        answer: item.color,
        title: item.phrase,
        sub: `${item.zh}｜選出花的顏色`,
        previewPrimary: item.phrase,
        previewSecondary: item.zh,
        choices: activeKeys
      }));
      const spell = [
        ...activeColors.slice(0, mode === "basic" ? 2 : 3).map((item) => ({
          type: "spell",
          answer: item.key,
          title: item.key,
          sub: `${item.zh}｜排出音節`,
          previewPrimary: item.key,
          previewSecondary: item.zh,
          chunks: item.chunks
        })),
        ...flowerPhrases.map((item) => ({
          type: "spell",
          answer: item.phrase.replaceAll(" ", ""),
          title: item.phrase,
          sub: `${item.zh}｜排出句型`,
          previewPrimary: item.phrase,
          previewSecondary: item.zh,
          color: item.color,
          chunks: item.chunks
        }))
      ];
      return shuffle([...colorPick, ...wordPick, ...phrasePick, ...spell]).slice(0, mode === "basic" ? 8 : 12);
    }

    function updateVocab() {
      const active = state.mode === "listen" ? listenKeys.map(byKey) : (state.mode === "basic" ? colors.slice(0, 2) : colors);
      vocabList.innerHTML = active.map((item) => `
        <div class="mini-card">
          <span class="swatch" style="--swatch:${item.hex}" aria-hidden="true"></span>
          <div>
            <strong>${item.key}</strong>
            <span>${item.zh}｜${item.meaning}${item.audio ? "" : "｜暫無 Klokah 音檔"}</span>
          </div>
          ${soundButtonMarkup(item.key)}
        </div>
      `).join("");
    }

    function soundButtonMarkup(key) {
      const item = byKey(key);
      const label = item?.audio ? `播放 ${item.key}，${item.zh}` : `${item?.key || key} 暫無音檔`;
      return `<button class="sound-button" type="button" data-sound="${key}" aria-label="${label}" title="${label}" ${item?.audio ? "" : "disabled"}></button>`;
    }

    function getColorAudio(key) {
      const item = byKey(key);
      if (!item?.audio) return null;
      if (!audioPool.has(key)) {
        const audio = new Audio();
        audio.preload = "auto";
        audio.src = item.audio;
        audio.load();
        audioPool.set(key, audio);
      }
      return audioPool.get(key);
    }

    function preloadColorAudio() {
      colors.forEach((item) => getColorAudio(item.key));
    }

    function playColorAudio(key) {
      const audio = getColorAudio(key);
      if (!audio) return;
      audio.pause();
      audio.currentTime = 0;
      audio.play().catch(() => {
        setFeedback("瀏覽器暫時擋住自動播放，請點喇叭按鈕再聽一次。", "warn");
      });
    }

    function playOnceFromButton(button, key) {
      if (!key || button.dataset.playingKey === key) return;
      button.dataset.playingKey = key;
      playColorAudio(key);
      window.setTimeout(() => {
        if (button.dataset.playingKey === key) {
          delete button.dataset.playingKey;
        }
      }, 450);
    }

    function setFeedback(text, tone = "neutral") {
      feedback.textContent = text;
      feedback.style.color = tone === "good" ? "#dff7b7" : tone === "warn" ? "#ffd9cb" : "#fff8ec";
    }

    function updateStatus() {
      scoreBox.textContent = `${state.score} 分`;
      roundBox.textContent = `${Math.min(state.index + 1, state.questions.length)} / ${state.questions.length}`;
      const pct = state.questions.length === 0 ? 0 : (state.index / state.questions.length) * 100;
      progressBar.style.width = `${pct}%`;
      nextBtn.disabled = state.locked;
    }

    function flowerMarkup(colorKey) {
      const color = byKey(colorKey);
      return `
        <div class="flower" style="--flower:${color.hex}" aria-label="${color.zh}的花">
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="center"></span>
          <span class="stem"></span>
          <span class="leaf"></span>
        </div>
      `;
    }

    function mysteryMarkup(label) {
      return `
        <div class="mystery-token" aria-label="族語詞卡">
          <span>族語詞卡</span>
          <b>${label}</b>
        </div>
      `;
    }

    function renderListenPicture(question) {
      const choices = question.choices.map(byKey);
      return `
        <div class="listen-area">
          <button class="listen-button" type="button" data-listen="${question.answer}">
            <span class="play-mark" aria-hidden="true">▶</span>
            <span>
              <strong>hana</strong>
              <span>聽一聽｜找圖卡</span>
            </span>
          </button>
          <div class="picture-choices">
            ${choices.map((item) => `
              <button class="picture-card" type="button" data-answer="${item.key}" aria-label="${item.zh} hana 圖卡">
                ${flowerMarkup(item.key)}
                <span class="picture-caption">
                  <strong>hana</strong>
                  <span>${item.zh} 圖卡</span>
                </span>
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderChoices(question) {
      const choices = question.choices.map(byKey);
      return `
        <div class="choices">
          ${choices.map((item) => `
            <button class="choice" type="button" data-answer="${item.key}">
              <span class="swatch" style="--swatch:${item.hex}" aria-hidden="true"></span>
              <span>
                <strong>${item.key}</strong>
                <span>${item.zh}</span>
              </span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderSpell(question) {
      const chunks = shuffle(question.chunks.map((chunk, index) => ({ chunk, id: `${chunk}-${index}` })));
      return `
        <div class="spell-area">
          <div class="answer-tray" id="answerTray" aria-label="拼字答案"></div>
          <div class="chunk-tray">
            ${chunks.map((item) => `
              <button class="chunk" type="button" data-chunk="${item.chunk}" data-id="${item.id}">${item.chunk}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderQuestion() {
      if (state.index >= state.questions.length) {
        renderComplete();
        return;
      }

      state.locked = false;
      state.spellPicked = [];
      const question = state.questions[state.index];
      if (question.type === "listenPicture") {
        stage.innerHTML = `
          <div class="roundline">
            <span>hana 聽圖</span>
            <span>第 ${state.index + 1} 題</span>
          </div>
          <h2 class="prompt">
            hana
            <small>${question.sub}</small>
          </h2>
          ${renderListenPicture(question)}
        `;

        setFeedback("按播放聽族語，再點一樣顏色的 hana 圖卡。");
        bindQuestion(question);
        updateStatus();
        return;
      }

      const isFlower = question.type === "pickFlower";
      const previewColor = question.type === "pickWord" ? question.answer : (isFlower ? question.answer : null);
      const visualKey = previewColor || question.color || (byKey(question.answer) ? question.answer : "kahengangay");
      const visual = question.type === "pickColor" ? mysteryMarkup(question.answer) : flowerMarkup(visualKey);

      stage.innerHTML = `
        <div class="roundline">
          <span>${question.type === "spell" ? "拼音解密" : "色彩配對"}</span>
          <span>第 ${state.index + 1} 題</span>
        </div>
        <h2 class="prompt">
          ${question.title}
          <small>${question.sub}</small>
        </h2>
        <div class="visual-zone">
          ${visual}
          <div class="word-preview">
            <div class="amis">${question.previewPrimary || question.title}</div>
            <div class="zh">${question.previewSecondary || question.sub}</div>
          </div>
        </div>
        ${question.type === "spell" ? renderSpell(question) : renderChoices(question)}
      `;

      setFeedback(question.type === "spell" ? "先讀族語，再點音節排順序。" : "先讀族語，再選答案。");
      bindQuestion(question);
      updateStatus();
    }

    function bindQuestion(question) {
      if (question.type === "listenPicture") {
        const listenButton = stage.querySelector("[data-listen]");
        listenButton.addEventListener("pointerdown", () => {
          if (state.locked) return;
          playOnceFromButton(listenButton, question.answer);
        });
        listenButton.addEventListener("click", () => {
          if (state.locked) return;
          playOnceFromButton(listenButton, question.answer);
        });

        stage.querySelectorAll(".picture-card").forEach((button) => {
          button.addEventListener("click", () => {
            if (state.locked) return;
            const correct = button.dataset.answer === question.answer;
            if (correct) {
              button.classList.add("is-correct");
              markCorrect(null);
            } else {
              button.classList.add("is-wrong");
              state.streak = 0;
              setFeedback("再聽一次，找一樣顏色的 hana 圖卡。", "warn");
              playColorAudio(question.answer);
            }
          });
        });
        return;
      }

      if (question.type === "spell") {
        stage.querySelectorAll(".chunk").forEach((button) => {
          button.addEventListener("click", () => {
            if (state.locked) return;
            button.classList.add("used");
            state.spellPicked.push(button.dataset.chunk);
            const tray = stage.querySelector("#answerTray");
            const chip = document.createElement("span");
            chip.className = "chunk";
            chip.textContent = button.dataset.chunk;
            tray.appendChild(chip);
            const joined = state.spellPicked.join("");
            const target = question.answer;
            if (state.spellPicked.length === question.chunks.length) {
              if (joined === target) {
                markCorrect(question.color || question.answer);
              } else {
                setFeedback("族語順序再調整一次。", "warn");
                window.setTimeout(() => renderQuestion(), 750);
              }
            }
          });
        });
        return;
      }

      stage.querySelectorAll(".choice").forEach((button) => {
        button.addEventListener("pointerdown", () => {
          if (state.locked) return;
          playOnceFromButton(button, button.dataset.answer);
        });

        button.addEventListener("click", () => {
          if (state.locked) return;
          playOnceFromButton(button, button.dataset.answer);
          const correct = button.dataset.answer === question.answer;
          if (correct) {
            button.classList.add("is-correct");
            markCorrect(null);
          } else {
            button.classList.add("is-wrong");
            state.streak = 0;
            setFeedback("再看一次族語和中文提示，就差一點。", "warn");
          }
        });
      });
    }

    function markCorrect(audioKey) {
      state.locked = true;
      state.streak += 1;
      state.score += 10 + Math.min(state.streak, 3) * 2;
      const goodText = state.mode === "listen"
        ? (state.streak >= 3 ? "連續答對，hana 圖卡都找到了！" : "答對了，找到一樣顏色的 hana。")
        : (state.streak >= 3 ? "連續答對，色彩密碼打開了！" : "答對了，先讀族語再到下一題。");
      setFeedback(goodText, "good");
      playColorAudio(audioKey);
      updateStatus();
      window.setTimeout(() => nextQuestion(), 900);
    }

    function nextQuestion() {
      if (state.index < state.questions.length) {
        state.index += 1;
      }
      renderQuestion();
    }

    function renderComplete() {
      const isListenMode = state.mode === "listen";
      progressBar.style.width = "100%";
      roundBox.textContent = `${state.questions.length} / ${state.questions.length}`;
      stage.innerHTML = `
        <div class="complete">
          <h2>${isListenMode ? "hana" : "kahengangay a hana"}</h2>
          <p>${isListenMode ? "完成 hana 聽圖。再聽一次顏色詞，找一樣顏色的花。" : "完成色彩密碼。最後大聲念：kahengangay a hana、kaliyalaway a hana。"}</p>
          <button class="action" type="button" id="playAgain">再玩一次</button>
        </div>
      `;
      setFeedback(`總分 ${state.score} 分。`);
      stage.querySelector("#playAgain").addEventListener("click", startGame);
    }

    function startGame() {
      state.questions = buildQuestions(state.mode);
      state.index = 0;
      state.score = 0;
      state.streak = 0;
      state.locked = false;
      preloadColorAudio();
      updateVocab();
      renderQuestion();
    }

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        document.querySelectorAll("[data-mode]").forEach((item) => {
          item.setAttribute("aria-pressed", String(item === button));
        });
        startGame();
      });
    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-sound]");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      if (button.disabled) return;
      playOnceFromButton(button, button.dataset.sound);
    });

    document.addEventListener("pointerdown", (event) => {
      const button = event.target.closest("[data-sound]");
      if (!button || button.disabled) return;
      playOnceFromButton(button, button.dataset.sound);
    });

    nextBtn.addEventListener("click", () => {
      if (!state.locked) {
        nextQuestion();
      }
    });

    resetBtn.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
